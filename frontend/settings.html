<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - Student Addiction Predictor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .settings-card {
            max-width: 600px;
            margin: 0 auto;
        }
    </style>
</head>
<body>
    <div class="container animate-fade-in">
        <nav>
            <div class="nav-brand">🎓 PredictorHub</div>
            <div class="nav-links">
                <a href="dashboard.html">Dashboard</a>
                <a href="predictor.html">Predictor</a>
                <a href="methodology.html">Methodology</a>
                <a href="wellbeing.html">Wellbeing</a>
                <span class="nav-divider"></span>
                <div id="nav-user-container"></div>
            </div>
        </nav>

        <div class="glass-panel settings-card mt-2">
            <h1>⚙️ Profile Settings</h1>
            <p class="text-muted">Manage your personal information and preferences.</p>
            <hr class="mt-1 mb-2">
            
            <form id="settingsForm">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="set-name" required>
                </div>
                
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="set-email" disabled style="opacity: 0.5; cursor: not-allowed">
                    <span class="hint">Email cannot be changed currently.</span>
                </div>
                
                <div class="form-group mt-1">
                    <label>Gender 🧑/👩</label>
                    <select id="set-gender" required>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                    </select>
                    <span class="hint">This is used securely as a baseline parameter by the AI model.</span>
                </div>
                
                <div class="text-center mt-2">
                    <button type="submit" class="btn">Update Profile</button>
                    <a href="dashboard.html" class="btn btn-secondary ml-1">Cancel</a>
                </div>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const user = await fetchUserData();
            if (user) {
                document.getElementById('set-name').value = user.name;
                document.getElementById('set-email').value = user.email;
                document.getElementById('set-gender').value = user.gender;
            }

            const form = document.getElementById('settingsForm');
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                const newName = document.getElementById('set-name').value;
                const newGender = document.getElementById('set-gender').value;
                
                const userId = localStorage.getItem('authToken');
                try {
                    const response = await fetch(`${API_URL}/user/${userId}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ name: newName, gender: newGender })
                    });
                    const result = await response.json();
                    if (result.success) {
                        showToast('Profile updated successfully!');
                        setTimeout(() => window.location.reload(), 1500);
                    } else {
                        showToast(result.message || 'Error updating profile', 'error');
                    }
                } catch (e) {
                    showToast('Server error', 'error');
                }
            });
        });
    </script>
</body>
</html>
